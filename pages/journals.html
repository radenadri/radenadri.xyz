<layout title="{frontmatter.title} | Adriana Eka Prayudha" src="main.html">
	<article class="prose prose-md tw-shadow-none tw-p-0">
		<div class="tw-mb-4">
			<h3 class="tw-text-neutral-900 tw-mb-2">{frontmatter.title}</h3>
			<div class="tw-flex tw-justify-between">
				<span class="tw-text-neutral-500 tw-font-mono tw-text-sm"
					>{frontmatter.date}</span
				>
				<span class="tw-text-neutral-500 tw-font-mono tw-text-sm"
					>{frontmatter.read}</span
				>
			</div>
		</div>
		{content}
	</article>
</layout>
